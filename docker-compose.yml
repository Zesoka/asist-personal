version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hub-personal-backend
    expose:
      - "8000"
    volumes:
      # Named volumes to persist database and user media files
      - db-data:/app/db_dir
      - media-data:/app/media
    environment:
      - DB_PATH=/app/db_dir/hub_personal.db
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - SECRET_KEY=${SECRET_KEY}
    restart: unless-stopped
    networks:
      - web-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: hub-personal-frontend
    expose:
      - "3000"
    environment:
      - NODE_ENV=production
    # Build Next.js optimized bundles and start the production server
    command: sh -c "npm run build && npm run start"
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - web-network

volumes:
  db-data:
  media-data:

networks:
  web-network:
    external: true
