services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hub-personal-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    environment:
      - DB_PATH=/app/hub_personal.db
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: hub-personal-frontend
    ports:
      - "8501:3000"
    volumes:
      - ./frontend:/app
      # Prevents host node_modules from overwriting container node_modules
      - /app/node_modules
    environment:
      - NODE_ENV=development
    restart: unless-stopped
    depends_on:
      - backend
